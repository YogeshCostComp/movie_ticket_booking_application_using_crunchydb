services:
  - type: web
    name: sre-agent
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MCP_SERVER_URL
        value: https://sre-mcp-server.260m2gai7zqb.us-south.codeengine.appdomain.cloud
      - key: MCP_API_KEY
        value: sre-mcp-secret-key-2026
      # IBM watsonx.governance — required for evaluation
      - key: WATSONX_APIKEY
        sync: false
      - key: WATSONX_REGION
        value: au-syd
      - key: WXG_SERVICE_INSTANCE_ID
        sync: false
      - key: WXG_DATA_MART_ID
        sync: false
      - key: WXG_CONTAINER_ID
        sync: false
